<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Đóng gói">
<title>Đóng gói nội thất</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --main:#F47A20;--main-dk:#B95008;--bg:#FFF7EF;--card:#fff;--text:#1f160f;--muted:#7b6a5d;
  --ok:#16834A;--err:#C0392B;--warn:#B7600A;--line:#ead8c8;--shadow:0 3px 14px rgba(120,65,10,.12);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding-bottom:78px}
.screen{display:none;min-height:100vh}.screen.active{display:block}
.hdr{background:linear-gradient(135deg,var(--main),var(--main-dk));color:#fff;padding:18px 18px 16px}
.hdr-title{font-size:22px;font-weight:800}.hdr-sub{font-size:13px;opacity:.88;margin-top:2px}
.body{padding:14px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:800;color:var(--main-dk);font-size:14px}
.card-body{padding:14px}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:15px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--main)}
.row{display:flex;gap:8px}.row>*{flex:1}
.btn{width:100%;border:none;border-radius:13px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}
.btn-main{background:var(--main);color:#fff}.btn-outline{background:#fff;color:var(--main-dk);border:1.5px solid var(--main)}
.btn-gray{background:#eee;color:#777;pointer-events:none}.btn-red{background:var(--err);color:#fff}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
.pill-ok{background:#E8F6EF;color:var(--ok)}.pill-warn{background:#FFF0D9;color:var(--warn)}.pill-err{background:#FDECEA;color:var(--err)}
.scan-box{position:relative;background:#111;border-radius:14px;overflow:hidden;height:260px;display:flex;align-items:center;justify-content:center}
#reader{width:100%!important;height:260px!important}.scan-line{position:absolute;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,#fff,transparent);animation:scan 1.8s linear infinite;display:none}
@keyframes scan{0%{top:18px}100%{top:calc(100% - 18px)}}
.info{display:flex;gap:8px;margin:7px 0}.k{min-width:80px;color:var(--muted);font-size:12px}.v{font-size:14px;font-weight:700;line-height:1.35}
.kien-item,.log-item{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:13px;margin-bottom:10px}
.kien-title{font-weight:900;color:var(--main-dk);font-size:16px}.meta{font-size:12px;color:var(--muted);margin-top:4px}
.bar{height:6px;background:#eee2d7;border-radius:999px;overflow:hidden;margin-top:9px}.fill{height:100%;background:var(--main)}
.nav{position:fixed;left:0;right:0;bottom:0;height:72px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:10}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;font-weight:700}.nav button.active{color:var(--main)}
.nav svg{width:23px;height:23px;display:block;margin:0 auto 3px;stroke:currentColor}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f160f;color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--muted);padding:25px 10px}
.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div class="screen active" id="sc-donggoi">
  <div class="hdr"><div class="hdr-title">Đóng gói</div><div class="hdr-sub" id="activeKienText">Chưa chọn kiện đang đóng</div></div>
  <div class="body">
    <div class="card">
      <div class="card-head">Kiện đang đóng</div>
      <div class="card-body">
        <div class="row">
          <button class="btn btn-outline" onclick="openTaoKien()">+ Tạo kiện</button>
          <button class="btn btn-outline" onclick="loadKien(true)">Chọn kiện</button>
          <button class="btn btn-outline" style="border-color:#16834A; color:#16834A;" onclick="inTemKien()">🖨️ In tem</button>
        </div>
        <div id="chonKienBox" style="display:none;margin-top:10px">
          <label>Chọn kiện</label>
          <select id="selectKien" onchange="setActiveKien(this.value)"></select>
        </div>
        <div id="taoKienBox" style="display:none;margin-top:10px">
          <div class="row">
            <div><label>Mã kiện</label><input id="maKienMoi" placeholder="VD: K001"></div>
            <div><label>Tên kiện</label><input id="tenKienMoi" placeholder="VD: Tủ bếp"></div>
          </div>
          <button class="btn btn-main" style="margin-top:10px" onclick="taoKien()">Tạo kiện</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:12px">
        <div class="scan-box"><div id="reader"></div><div class="scan-line" id="scanLine"></div></div>
        <div class="row" style="margin-top:10px">
          <button class="btn btn-outline" onclick="nhapTay()">Nhập tay</button>
          <button class="btn btn-main" id="btnCamera" onclick="toggleCamera()">Bật camera</button>
          <button class="btn btn-outline" id="btnFlash" onclick="toggleFlash()">🔦 Đèn</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">Danh sách quét tạm</div>
      <div class="card-body">
        <div id="batchList" class="empty">Chưa có chi tiết nào.</div>
        <button class="btn btn-main" style="margin-top:12px" onclick="xacNhanHangLoat()">Xác nhận vào kiện</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="sc-kien">
  <div class="hdr"><div class="hdr-title">Kiện hàng</div><div class="hdr-sub" id="kienSummary">Danh sách kiện đóng gói</div></div>
  <div class="body">
    <!-- THAY ĐỔI 3: Ô tìm kiếm kiện hàng -->
    <input id="searchKien" placeholder="Tìm mã kiện hoặc tên kiện..." oninput="filterKien()" style="margin-bottom:10px">
    <button class="btn btn-outline" onclick="loadKien()">↻ Làm mới</button>
    <div id="kienList"><div class="empty">Đang tải...</div></div>
  </div>
</div>

<div class="screen" id="sc-lichsu">
  <div class="hdr"><div class="hdr-title">Lịch sử quét</div><div class="hdr-sub" id="historyCount">0 lần quét</div></div>
  <div class="body"><div id="historyList"><div class="empty">Chưa có lịch sử.</div></div></div>
</div>

<nav class="nav">
  <button class="active" id="nav-donggoi" onclick="go('donggoi')">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7h-7z"/></svg>Đóng gói
  </button>
  <button id="nav-kien" onclick="go('kien')">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.7z"/><path d="M3.3 7L12 12l8.7-5"/></svg>Kiện
  </button>
  <button id="nav-lichsu" onclick="go('lichsu')">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Lịch sử
  </button>
</nav>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbws8sm0KomqsPlHK9Dq6ivY05AhpZHAJujGuPTdiSZsUPf9YHUlpIoJWqUcvN1_SHwiDA/exec';

let activeKien = JSON.parse(localStorage.getItem('active_kien') || 'null');
let currentItem = null, scanner = null, cameraOn = false;
let batchItems = JSON.parse(localStorage.getItem('batch_items') || '[]');
let history = JSON.parse(localStorage.getItem('donggoi_history') || '[]');

// SỬA LỖI 1: Biến kiểm soát thời gian quét lặp
let lastScan = '';
let lastScanTime = 0;
let scanLock = false;
let videoTrack = null;
let flashOn = false;

// THAY ĐỔI 3: Biến lưu toàn bộ danh sách kiện để lọc
let allKienItems = [];

updateActiveText();
renderBatch();

function go(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('sc-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  if(s==='kien') loadKien();
  if(s==='lichsu') renderHistory();
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),2200)}

function updateActiveText(){
  document.getElementById('activeKienText').textContent = activeKien ? `Kiện đang đóng: ${activeKien.maKien} - ${activeKien.tenKien}` : 'Chưa chọn kiện đang đóng';
}

function openTaoKien(){
  document.getElementById('taoKienBox').style.display='block';
  document.getElementById('chonKienBox').style.display='none';
}

async function taoKien(){
  const ma=document.getElementById('maKienMoi').value.trim();
  const ten=document.getElementById('tenKienMoi').value.trim();
  if(!ma||!ten){toast('Nhập đủ mã kiện và tên kiện');return}
  try{
    const res = await fetch(`${API}?action=taoKien&maKien=${encodeURIComponent(ma)}&tenKien=${encodeURIComponent(ten)}`);
    const d=await res.json();
    if(d.success){
      activeKien={maKien:ma,tenKien:ten}; localStorage.setItem('active_kien',JSON.stringify(activeKien));
      updateActiveText(); document.getElementById('taoKienBox').style.display='none'; toast('Đã tạo kiện');
    } else toast(d.error||'Không tạo được kiện');
  }catch(e){toast('Lỗi kết nối')}
}

async function loadKien(showSelect=false){
  if(showSelect) document.getElementById('chonKienBox').style.display='block';
  try{
    const res=await fetch(`${API}?action=listKien`);
    const d=await res.json();
    const items=d.items||[];
    // THAY ĐỔI 3: Lưu toàn bộ danh sách để dùng khi lọc
    allKienItems = items;
    if(showSelect){
      const sl=document.getElementById('selectKien');
      sl.innerHTML='<option value="">-- Chọn kiện --</option>'+items.map(k=>`<option value="${k.Ma_Kien}">${k.Ma_Kien} - ${k.Ten_Kien}</option>`).join('');
      window.kienItems=items;
    }
    renderKien(items);
  }catch(e){document.getElementById('kienList').innerHTML='<div class="empty">Lỗi tải dữ liệu.</div>'}
}

function setActiveKien(ma){
  const k=(window.kienItems||allKienItems).find(x=>String(x.Ma_Kien)===String(ma));
  if(!k)return;
  activeKien={maKien:k.Ma_Kien,tenKien:k.Ten_Kien};
  localStorage.setItem('active_kien',JSON.stringify(activeKien));
  updateActiveText(); toast('Đã chọn kiện '+k.Ma_Kien);
}

// THAY ĐỔI 3: Hàm lọc kiện theo từ khoá tìm kiếm
function filterKien(){
  const q = document.getElementById('searchKien').value.toLowerCase().trim();
  const filtered = allKienItems.filter(k =>
    String(k.Ma_Kien || '').toLowerCase().includes(q) ||
    String(k.Ten_Kien || '').toLowerCase().includes(q)
  );
  renderKien(filtered);
}

function renderKien(items){
  const el=document.getElementById('kienList');
  if(!items.length){el.innerHTML='<div class="empty">Chưa có kiện.</div>';return}
  let du=0,dang=0;
  // THAY ĐỔI 2: Mỗi kiện có nút Chọn kiện và In tem riêng
  el.innerHTML=items.map(k=>{
    const tong=Number(k.Tong_Tam||0), da=Number(k.Da_Quet||0), thieu=Math.max(tong-da,0);
    const pct=tong?Math.min(100,Math.round(da/tong*100)):0;
    const done= tong>0 && thieu===0;
    done?du++:dang++;
    return `<div class="kien-item">
  <div onclick="xemChiTietKien('${k.Ma_Kien}')">
    <div class="kien-title">${k.Ma_Kien} - ${k.Ten_Kien}</div>
    <div class="meta">${da}/${tong} tấm · còn thiếu ${thieu}</div>
    <div style="margin-top:6px">
      <span class="pill ${done?'pill-ok':'pill-warn'}">${done?'Đủ - đóng được':'Đang đóng'}</span>
    </div>
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
  </div>
  <div class="row" style="margin-top:10px">
    <button class="btn btn-outline" onclick="setActiveKien('${k.Ma_Kien}')">Chọn kiện</button>
    <button class="btn btn-outline" onclick="inTemKien('${k.Ma_Kien}')">🖨️ In tem</button>
  </div>
</div>`;
  }).join('');
  document.getElementById('kienSummary').textContent=`${du} kiện đủ · ${dang} kiện đang đóng`;
}

function toggleCamera(){cameraOn?stopCamera():startCamera()}

function startCamera(){
  if(!scanner){
    scanner = new Html5Qrcode('reader');
  }

  document.getElementById('btnCamera').textContent='Tắt camera';
  document.getElementById('btnCamera').className='btn btn-outline';
  document.getElementById('scanLine').style.display='block';

  scanner.start(
    { facingMode:'environment' },
    { fps:30, qrbox:{width:300,height:180}, aspectRatio:1.777 },
    txt => { onScanFast(txt.trim()); },
    () => {}
  ).then(() => {
    cameraOn = true;
    const video = document.querySelector('#reader video');
    if(video && video.srcObject){
      const tracks = video.srcObject.getVideoTracks();
      videoTrack = tracks && tracks.length ? tracks[0] : null;
    }
  }).catch(() => toast('Không mở được camera'));
}

function stopCamera(){
  if(scanner&&cameraOn){scanner.stop().catch(()=>{});cameraOn=false}
  // Reset flash khi tắt camera
  flashOn = false;
  videoTrack = null;
  document.getElementById('btnFlash').textContent = '🔦 Đèn';
  document.getElementById('btnCamera').textContent='Bật camera';
  document.getElementById('btnCamera').className='btn btn-main';
  document.getElementById('scanLine').style.display='none';
}

async function toggleFlash(){
  if(!videoTrack){ toast('Camera chưa bật'); return; }

  const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
  if(!caps.torch){ toast('Máy không hỗ trợ bật đèn'); return; }

  flashOn = !flashOn;
  try{
    await videoTrack.applyConstraints({ advanced:[{torch:flashOn}] });
    document.getElementById('btnFlash').textContent = flashOn ? '💡 Tắt đèn' : '🔦 Đèn';
    toast(flashOn ? 'Đã bật đèn' : 'Đã tắt đèn');
  }catch(e){
    toast('Không bật được đèn');
  }
}

function nhapTay(){stopCamera();const v=prompt('Nhập mã QR / index');if(v)onScan(v.trim())}

async function onScanFast(index){
  if(!activeKien){ toast('Hãy tạo hoặc chọn kiện trước'); return; }

  const now = Date.now();
  if(index === lastScan && now - lastScanTime < 500) return;
  if(batchItems.find(x => String(x.index) === String(index))) return;
  if(scanLock) return;

  lastScan = index;
  lastScanTime = now;
  scanLock = true;

  try{
    const res = await fetch(
      `${API}?action=lookup&index=${encodeURIComponent(index)}&maKien=${encodeURIComponent(activeKien.maKien)}`
    );
    const d = await res.json();
    if(d.found){
      addToBatch(d);
      beep();
      toast('Đã quét QR #' + index);
    }
  }catch(e){
    toast('Lỗi kết nối');
  }finally{
    setTimeout(() => { scanLock = false; }, 120);
  }
}

async function onScan(index){
  if(!activeKien){toast('Hãy tạo hoặc chọn kiện trước');return}
  
  // SỬA LỖI 1: Bộ lọc Debounce chặn spam request liên tục trong 1.5 giây
  const now = Date.now();
  if(index === lastScan && now - lastScanTime < 700){
      return;
  }
  lastScan = index;
  lastScanTime = now;

  // Đã có trong danh sách tạm → bỏ qua, không gọi API
  if(batchItems.find(x => String(x.index) === String(index))){
    return;
  }

  try{
    // toast('Đang tra QR...'); // bỏ để không làm chậm cảm giác thao tác
    const res=await fetch(`${API}?action=lookup&index=${encodeURIComponent(index)}&maKien=${encodeURIComponent(activeKien.maKien)}`);
    const d=await res.json();
    if(!d.found){toast('Không tìm thấy QR');return}
    
    addToBatch(d);
    beep();
    toast('Đã thêm vào danh sách tạm');
  }catch(e){toast('Lỗi kết nối')}
}

// =====================================================
// LOGIC DANH SÁCH TẠM & XỬ LÝ HÀNG LOẠT
// =====================================================

function addToBatch(item){
  const exists = batchItems.find(x => String(x.index) === String(item.index));
  if(exists){
    toast('QR này đã có trong danh sách tạm');
    return;
  }

  batchItems.unshift({
    index: item.index,
    label: item.label,
    tenKien: item.tenKien,
    kichThuoc: item.kichThuoc,
    vatLieu: item.vatLieu,
    status: 'ok'
  });

  localStorage.setItem('batch_items', JSON.stringify(batchItems));
  renderBatch();
}

function renderBatch(){
  const el = document.getElementById('batchList');
  if(!el) return;

  if(!batchItems.length){
    el.innerHTML = '<div class="empty">Chưa có chi tiết nào.</div>';
    return;
  }

  el.innerHTML = batchItems.map((x, i) => `
    <div class="log-item" style="border: 1px solid var(--line); margin-bottom: 8px;">
      <b>QR #${x.index}</b>
      <div class="meta">${x.label || ''} | ${x.kichThuoc || ''}</div>
      <div class="row" style="margin-top:8px">
        <button class="btn ${x.status === 'ok' ? 'btn-main' : 'btn-outline'}" onclick="setBatchStatus(${i}, 'ok')">Đạt</button>
        <button class="btn ${x.status === 'loai' ? 'btn-red' : 'btn-outline'}" onclick="setBatchStatus(${i}, 'loai')">Loại</button>
      </div>
    </div>
  `).join('');
}

function setBatchStatus(i, status){
  if(status === 'loai'){
    batchItems.splice(i, 1);
    localStorage.setItem('batch_items', JSON.stringify(batchItems));
    renderBatch();
    toast('Đã loại khỏi danh sách');
    return;
  }

  batchItems[i].status = status;
  localStorage.setItem('batch_items', JSON.stringify(batchItems));
  renderBatch();
}

async function xacNhanHangLoat(){
  if(!activeKien){
    toast('Chưa chọn kiện');
    return;
  }

  const items = batchItems.filter(x => x.status === 'ok');

  if(!items.length){
    toast('Không có chi tiết đạt để thêm');
    return;
  }

  try{
    toast('Đang lưu hàng loạt...');

    const res = await fetch(API, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'themHangLoat',
        maKien: activeKien.maKien,
        tenKien: activeKien.tenKien,
        items: items
      })
    });

    const d = await res.json();

    if(d.success){
      toast(`Đã thêm ${d.added} chi tiết vào kiện`);
      
      items.forEach(x => {
        history.unshift({time: new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}), maKien: activeKien.maKien, index: x.index, label: x.label});
      });
      if(history.length>100) history.splice(100);
      localStorage.setItem('donggoi_history', JSON.stringify(history));

      batchItems = batchItems.filter(x => x.status !== 'ok');
      localStorage.setItem('batch_items', JSON.stringify(batchItems));
      
      renderBatch();
      loadKien();
    } else {
      toast(d.error || 'Không lưu được');
    }
  }catch(e){
    toast('Lỗi kết nối');
  }
}

// THAY ĐỔI 1: Hàm in tem dùng window.open để mở đúng giao diện in trên iPhone
// Nhận thêm tham số maKien để in từ màn hình Kiện hàng
function inTemKien(maKien = null){
  const kienCanIn = maKien || (activeKien ? activeKien.maKien : '');
  if(!kienCanIn){
    toast('Chưa chọn kiện để in');
    return;
  }
  const url = `${API}?action=inTem&maKien=${encodeURIComponent(kienCanIn)}`;
  window.open(url, '_blank');
}

function renderHistory(){
  document.getElementById('historyCount').textContent=history.length+' lần quét';
  const el=document.getElementById('historyList');
  if(!history.length){el.innerHTML='<div class="empty">Chưa có lịch sử.</div>';return}
  el.innerHTML=history.map(h=>`<div class="log-item"><b>${h.time} · ${h.maKien} · QR #${h.index}</b><div class="meta">${h.label||''}</div></div>`).join('');
}

loadKien();

function beep(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 900;

    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.06);
  }catch(e){}
}
</script>
